<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrainBounce - Quiz Interactif</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="BrainBounce_logo.png">
</head>

<body>
    <video id="webcam" autoplay playsinline muted></video>
    <div id="cursor"></div>

    <div class="screen active gameMenu" id="menuScreen">
        <h1>Choisis un thème</h1>
        <div class="buttons">
            <button class="theme-btn" data-theme="geographie">Géographie</button>
            <button class="theme-btn" data-theme="histoire">Histoire</button>
            <button class="theme-btn" data-theme="sports">Sports</button>
        </div>
    </div>

    <!-- LOADER
<div id="loader" class="screen hidden">
  <div class="loader"></div>
  <p>Chargement...</p>
</div> -->

    <div class="screen hidden quiz" id="quizScreen">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <h2 id="themeLabel"></h2>
        <div id="questionText"></div>
        <div id="statusText"></div>
        <div id="spokenText"></div>
        <div id="resultText"></div>

        <div class="buttons">
            <button id="listenBtn">Répondre à l'oral</button>
            <button id="nextBtn">Question suivante</button>
            <button id="backBtn">Retour</button>
        </div>
    </div>

    <!-- RESULT -->
<div id="result" class="screen hidden result">
  <h2>🎉 Résultat</h2>
  <div class="score" id="score"></div>
  <p id="message"></p>
  <button class="btn" id="restartBtn">Rejouer</button>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="hand-tracking.js"></script>
    <script src="script.js"></script>
</body>

</html>
